name: Workflow file for go project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Go
      uses: actions/setup-go@v2
      with:
        go-version: 1.17
    - name: Build
      run: go build -v ./...

    - name: Test
      run: go test -v ./...
  
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v2
    - name: Build Docker image
      run: docker build -t my-go-app .
    - name: Run Docker container
      run: docker run -d -p 8080:8080 my-go-app
    - name: Push github container registry
      run: echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
    - name: transform github repo capital name to simple name
      run: echo "REPO_NAME=$(echo ${{ github.repository }} | awk -F/ '{print tolower($2)}')" >> $GITHUB_ENV
    - name: Tag and push Docker image to github container registry
      run: |
        docker tag my-go-app ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME }}:latest
        docker push ghcr.io/${{ github.repository_owner }}/${{ env.REPO_NAME }}:latest
    - name: Logout from github container registry
      run: docker logout ghcr.io