name: Workflow file for go project

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
    - name: Set up Go
      uses: actions/setup-go@v2
      with:
          go-version: '1.22'

    - name: Build Go binary
      run: |
        CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o my-go-app .
        ls -alt && pwd
        ls -alt my-go-app

    - name: Test
      run: go test -v ./...

    - name: Upload Go binary artifact
      uses: actions/upload-artifact@v4
      with:
        name: go-app-binary
        path: my-go-app
  
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - uses: actions/checkout@v2
    
    - name: Download Go binary artifact
      uses: actions/download-artifact@v4
      with:
        name: go-app-binary
        path: .
    
    - name: Build Docker image
      run: docker build -t my-go-app .

    - name: Login to GitHub Container Registry
      run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

    - name: Set lowercase image name
      run: |
        OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
        REPO=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]')
        echo "IMAGE_NAME=ghcr.io/$OWNER/$REPO:latest" >> $GITHUB_ENV

    - name: Tag and push Docker image
      run: |
        docker tag my-go-app $IMAGE_NAME
        docker push $IMAGE_NAME